<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecteurs Math - Analyse</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; margin: 0; padding: 20px; }
        canvas { background: white; border: 2px solid #333; cursor: crosshair; touch-action: none; max-width: 100%; }
        .status-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
            min-width: 300px;
        }
        .info { font-size: 18px; font-weight: bold; color: #d35400; }
    </style>
</head>
<body>

    <h1>Analyse des Vecteurs</h1>
    <canvas id="canvas" width="600" height="400"></canvas>

    <div class="status-box">
        <div id="direction-info" class="info">Direction: --</div>
        <div id="sens-info" class="info">Sens: --</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let points = {
            A: { x: 100, y: 150 }, B: { x: 300, y: 150 },
            C: { x: 100, y: 250 }, D: { x: 300, y: 250 }
        };

        let activePoint = null;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawVector(points.A, points.B, 'red', 'u');
            drawVector(points.C, points.D, 'green', 'v');
            
            for (let p in points) {
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(points[p].x, points[p].y, 6, 0, Math.PI * 2); ctx.fill();
                ctx.fillText(p, points[p].x + 10, points[p].y - 10);
            }
            analyzeVecteurs();
        }

        function drawVector(p1, p2, color, label) {
            ctx.strokeStyle = color; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(p2.x, p2.y);
            ctx.lineTo(p2.x - 15 * Math.cos(angle - Math.PI / 6), p2.y - 15 * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(p2.x - 15 * Math.cos(angle + Math.PI / 6), p2.y - 15 * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        function analyzeVecteurs() {
            const u = { x: points.B.x - points.A.x, y: points.B.y - points.A.y };
            const v = { x: points.D.x - points.C.x, y: points.D.y - points.C.y };

            // حساب التوازي (Direction)
            const det = u.x * v.y - u.y * v.x;
            const isParallel = Math.abs(det) < 1000; 

            if (isParallel) {
                document.getElementById('direction-info').innerText = "Direction: Même Direction (Parallèles)";
                // حساب المنحى (Sens)
                const dotProduct = u.x * v.x + u.y * v.y;
                if (dotProduct > 0) {
                    document.getElementById('sens-info').innerText = "Sens: Même Sens";
                } else {
                    document.getElementById('sens-info').innerText = "Sens: Sens Contraire (Opposé)";
                }
            } else {
                document.getElementById('direction-info').innerText = "Direction: Différente";
                document.getElementById('sens-info').innerText = "Sens: --";
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function start(e) {
            const pos = getPos(e);
            for (let p in points) {
                if (Math.hypot(points[p].x - pos.x, points[p].y - pos.y) < 20) activePoint = p;
            }
            if (e.touches && activePoint) e.preventDefault();
        }

        function move(e) {
            if (!activePoint) return;
            const pos = getPos(e);
            points[activePoint].x = pos.x; points[activePoint].y = pos.y;
            draw();
            if (e.touches) e.preventDefault();
        }

        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => activePoint = null);
        canvas.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', () => activePoint = null);

        draw();
    </script>
</body>
</html>

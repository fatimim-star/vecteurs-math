<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vecteurs Math - Interactif</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; touch-action: none; }
        canvas { background: #000; cursor: crosshair; max-width: 100%; }
        .info { padding: 15px; background: #222; width: 100%; text-align: center; border-bottom: 2px solid #444; }
        .result { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="info">
        <div id="coords">Déplacez les points A, B, C, D</div>
        <div id="vector-u" style="color: #ff4444;"></div>
        <div id="vector-v" style="color: #4444ff;"></div>
        <div id="sum" class="result"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('coords');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 150;

        let points = {
            A: { x: 100, y: 100, color: '#ff4444', label: 'A' },
            B: { x: 250, y: 150, color: '#ff4444', label: 'B' },
            C: { x: 100, y: 300, color: '#4444ff', label: 'C' },
            D: { x: 200, y: 250, color: '#4444ff', label: 'D' }
        };

        let draggingPoint = null;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid
            ctx.strokeStyle = '#333';
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Draw Vectors
            drawVector(points.A, points.B, '#ff4444', 'u');
            drawVector(points.C, points.D, '#4444ff', 'v');

            // Draw Points
            for(let p in points) {
                ctx.fillStyle = points[p].color;
                ctx.beginPath();
                ctx.arc(points[p].x, points[p].y, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillText(p, points[p].x + 12, points[p].y - 12);
            }

            updateCalculations();
        }

        function drawVector(p1, p2, color, label) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            // Arrow head
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            ctx.beginPath();
            ctx.moveTo(p2.x, p2.y);
            ctx.lineTo(p2.x - 15 * Math.cos(angle - Math.PI/6), p2.y - 15 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(p2.x - 15 * Math.cos(angle + Math.PI/6), p2.y - 15 * Math.sin(angle + Math.PI/6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function updateCalculations() {
            let u = { x: (points.B.x - points.A.x)/40, y: -(points.B.y - points.A.y)/40 };
            let v = { x: (points.D.x - points.C.x)/40, y: -(points.D.y - points.C.y)/40 };
            document.getElementById('vector-u').innerText = `u (${u.x.toFixed(1)}, ${u.y.toFixed(1)})`;
            document.getElementById('vector-v').innerText = `v (${v.x.toFixed(1)}, ${v.y.toFixed(1)})`;
            document.getElementById('sum').innerText = `u + v = (${(u.x + v.x).toFixed(1)}, ${(u.y + v.y).toFixed(1)})`;
        }

        function getPos(e) {
            let t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY - canvas.offsetTop };
        }

        function down(e) {
            let pos = getPos(e);
            for(let p in points) {
                if(Math.hypot(points[p].x - pos.x, points[p].y - pos.y) < 20) {
                    draggingPoint = p;
                    break;
                }
            }
        }

        function move(e) {
            if(!draggingPoint) return;
            let pos = getPos(e);
            points[draggingPoint].x = pos.x;
            points[draggingPoint].y = pos.y;
            draw();
            e.preventDefault();
        }

        function up() { draggingPoint = null; }

        canvas.addEventListener('mousedown', down);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);

        canvas.addEventListener('touchstart', down, {passive: false});
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', up, {passive: false});

        draw();
    </script>
</body>
</html>
